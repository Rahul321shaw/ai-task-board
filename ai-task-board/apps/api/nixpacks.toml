[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.33.0",
  "cd /app && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd /app && pnpm --filter @ai-task-board/api db:generate",
  "cd /app && pnpm --filter @ai-task-board/api build"
]

[start]
cmd = "node /app/apps/api/dist/index.js"
